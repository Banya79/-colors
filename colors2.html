.slider-val {
  font-size: 12px;
  color: #444;
  width: 30px;
  text-align: right;
}

/* — 기본 24색 — */
.basic-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
}
.palette-wrap {
  border-radius: 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  padding: 28px;
  width: 480px;
}

.palette-title {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 20px;
  text-align: center;
}

.section-label {
  font-size: 12px;
  color: #888;
  margin-bottom: 6px;
  letter-spacing: 0.5px;
}
